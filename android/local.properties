## Isi path Flutter SDK kamu di sini!
## Contoh Windows:  flutter.sdk=C:\\Users\\NamaKamu\\flutter
## Contoh Mac/Linux: flutter.sdk=/home/username/flutter
flutter.sdk=/home/user/flutter

## Path Android SDK (biasanya diisi otomatis oleh Android Studio)
## Contoh Windows: sdk.dir=C:\\Users\\NamaKamu\\AppData\\Local\\Android\\Sdk
## Contoh Mac:     sdk.dir=/Users/NamaKamu/Library/Android/sdk
sdk.dir=/home/user/Android/Sdk
